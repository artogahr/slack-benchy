# Slack app manifest for slack-benchy.
#
# How to use:
#   1. Go to https://api.slack.com/apps and click "Create New App" → "From an app manifest".
#   2. Pick your workspace.
#   3. Paste the content of this file. Slack will set every scope/feature in one go.
#   4. After creation: under "Basic Information", scroll to "App-Level Tokens" and
#      generate a token with scope `connections:write`. That is your SLACK_APP_TOKEN
#      (starts with xapp-). Save it.
#   5. Under "Install App", click "Install to <workspace>". That gives you the
#      SLACK_BOT_TOKEN (starts with xoxb-). Save that too.
#   6. Put both tokens into your .env (see .env.example).
#
# If you change features in your app's settings later, mirror the change here so
# someone re-creating from this manifest gets the same setup.

display_information:
  name: Benchy
  description: Live 3D-printer status and controls in Slack, via PrusaLink and Socket Mode.
  background_color: "#FA6831"  # Prusa orange
  # Replace the Purpose and Owner lines below before submitting for approval.
  # Some IT teams require both fields on every Slack app; harmless to fill in
  # even if yours doesn't.
  long_description: |
    Purpose: Posts live status of a Prusa 3D printer in a Slack channel and
    lets people opt in to DM notifications when their print finishes, pauses,
    or errors. Filament inventory and job pause/resume/cancel exposed as
    buttons. Runs over Socket Mode, so no public URL or inbound network access
    is required.

    Owner: <YOUR NAME OR TEAM> — replace this line before submitting.

    Source: https://github.com/artogahr/slack-benchy (open source, MIT).
    Self-hosted: this workspace's install talks only to its own self-hosted
    instance and its own printer.
features:
  bot_user:
    display_name: Benchy
    always_online: true
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: false
    messages_tab_read_only_enabled: false
oauth_config:
  scopes:
    bot:
      - chat:write
      - chat:write.public
      - im:write
      - channels:read
      - channels:join
      - groups:read
      - reactions:write
      - files:write
      - pins:write
      - users:read
      - im:history
settings:
  event_subscriptions:
    bot_events: []
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
